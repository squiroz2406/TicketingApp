services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: Admin123!
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql 
    healthcheck:
      test: [
        "CMD",
        "/opt/mssql-tools18/bin/sqlcmd",
        "-S", "localhost",
        "-U", "sa",
        "-P", "${SA_PASSWORD}",
        "-Q", "SELECT 1",
        "-C"
      ]
      interval: 10s
      retries: 5
      start_period: 20s

  ticketingapp:
    build: .
    container_name: ticketingapp
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=TicketingDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;"
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - dataprotection_keys:/root/.aspnet/DataProtection-Keys

volumes:
  sqlserver_data:
  dataprotection_keys:
